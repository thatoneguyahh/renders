<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>renders</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#00ff00;--dim:#00aa00;--dark-green:#006600;--bg:#0a0a0a;
  --widget-bg:#0f0f0f;--border:#222;--titlebar:#141414;
  --btn-close:#ff5f57;--btn-min:#febc2e;--btn-max:#28c840;
  --fs:14px;--line-h:1.45;--prompt-color:#00ff00;
  --peer-color:#00aaff;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Courier New',Courier,monospace;touch-action:none}
#app{width:100%;height:100%;display:flex;flex-direction:column;position:relative}
#toolbar{
  height:36px;min-height:36px;background:#0c0c0c;border-bottom:1px solid #1a1a1a;
  display:flex;align-items:center;padding:0 8px;gap:6px;flex-shrink:0;z-index:2000;
  overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
#toolbar::-webkit-scrollbar{display:none}
#toolbar-title{color:var(--dim);font-size:11px;letter-spacing:3px;text-transform:uppercase;flex-shrink:0;margin-right:4px}
#file-input{display:none}
.tb-btn{
  background:none;border:1px solid #282828;color:var(--dim);font-family:'Courier New',monospace;
  font-size:10px;padding:3px 8px;cursor:pointer;letter-spacing:1px;white-space:nowrap;
  flex-shrink:0;transition:border-color .1s,color .1s;border-radius:2px;
}
.tb-btn:hover,.tb-btn:active{border-color:var(--green);color:var(--green)}
.tb-btn.peer-active{border-color:var(--peer-color);color:var(--peer-color)}
#peer-status{color:#333;font-size:10px;flex-shrink:0;letter-spacing:1px;transition:color .3s}
#peer-status.connected{color:var(--peer-color)}
#terminal-wrap{position:absolute;top:36px;left:0;right:0;bottom:0;overflow:hidden;z-index:10}
#terminal{
  width:100%;height:100%;overflow-y:auto;overflow-x:hidden;
  padding:8px 10px 80px;background:var(--bg);color:var(--green);
  font-family:'Courier New',Courier,monospace;font-size:var(--fs);line-height:var(--line-h);
  cursor:text;scrollbar-width:thin;scrollbar-color:#1a3a1a #0a0a0a;-webkit-overflow-scrolling:touch;
}
#terminal::-webkit-scrollbar{width:4px}
#terminal::-webkit-scrollbar-track{background:#0a0a0a}
#terminal::-webkit-scrollbar-thumb{background:#1a3a1a;border-radius:2px}
.t-line{white-space:pre-wrap;word-break:break-word;min-height:calc(var(--line-h)*1em)}
.t-prompt{color:var(--green)}.t-output{color:var(--green)}.t-error{color:#ff4444}
.t-dim{color:var(--dim)}.t-warn{color:#febc2e}.t-info{color:#44aaff}.t-peer{color:var(--peer-color)}
#input-row{display:flex;align-items:center;padding:1px 0 1px}
#input-prefix{color:var(--green);white-space:pre;flex-shrink:0;user-select:none}
#input-field{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--green);font-family:'Courier New',Courier,monospace;
  font-size:var(--fs);line-height:var(--line-h);caret-color:var(--green);min-width:0;
}
#mobile-input-bar{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:3000;
  background:#0c0c0c;border-top:1px solid #222;padding:6px 8px;flex-direction:column;gap:4px;
}
#mobile-input-wrap{display:flex;align-items:center;gap:6px}
#mobile-prefix{color:var(--green);font-size:13px;flex-shrink:0;user-select:none;font-family:'Courier New',monospace}
#mobile-field{
  flex:1;background:#111;border:1px solid #2a2a2a;border-radius:3px;
  color:var(--green);font-family:'Courier New',monospace;font-size:13px;
  padding:6px 8px;outline:none;caret-color:var(--green);min-width:0;-webkit-appearance:none;appearance:none;
}
#mobile-send{
  background:none;border:1px solid #2a2a2a;color:var(--green);font-family:'Courier New',monospace;
  font-size:11px;padding:6px 10px;cursor:pointer;flex-shrink:0;border-radius:2px;
}
#mobile-send:active{border-color:var(--green);background:#0a1a0a}
#mobile-shortcuts{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
#mobile-shortcuts::-webkit-scrollbar{display:none}
.mob-key{
  background:#111;border:1px solid #222;color:var(--dim);font-family:'Courier New',monospace;
  font-size:10px;padding:3px 8px;cursor:pointer;white-space:nowrap;flex-shrink:0;border-radius:2px;
}
.mob-key:active{background:#1a3a1a;color:var(--green);border-color:var(--green)}
#widget-area{position:absolute;top:36px;left:0;right:0;bottom:0;pointer-events:none;z-index:100;overflow:hidden}
.widget{
  position:absolute;background:var(--widget-bg);border:1px solid var(--border);
  border-radius:5px;box-shadow:0 12px 48px rgba(0,0,0,.9);
  display:flex;flex-direction:column;min-width:180px;min-height:100px;
  pointer-events:all;z-index:200;transition:box-shadow .15s;
}
.widget.focused{border-color:#333;box-shadow:0 12px 56px rgba(0,255,0,.07),0 0 0 1px #1a1a1a}
.widget.fullscreen{border-radius:0;border-color:var(--dark-green)!important;box-shadow:none!important}
.widget-titlebar{
  height:30px;background:var(--titlebar);display:flex;align-items:center;
  padding:0 8px;cursor:move;border-radius:5px 5px 0 0;flex-shrink:0;
  user-select:none;gap:6px;touch-action:none;
}
.wt-btns{display:flex;gap:5px;align-items:center;flex-shrink:0}
.wt-btn{
  width:12px;height:12px;border-radius:50%;border:none;cursor:pointer;flex-shrink:0;
  transition:opacity .1s,transform .1s;position:relative;
}
.wt-btn.close{background:var(--btn-close)}.wt-btn.min{background:var(--btn-min)}.wt-btn.max{background:var(--btn-max)}
.wt-btn:hover{opacity:.8;transform:scale(1.15)}
.wt-title{color:#555;font-size:11px;flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.wt-id{color:#2a2a2a;font-size:10px;flex-shrink:0}
.widget-body{flex:1;overflow:hidden;border-radius:0 0 5px 5px;position:relative;background:#050505}
.widget-body iframe{width:100%;height:100%;border:none;background:#fff;display:block}
.widget-body video{width:100%;height:100%;background:#000;display:block}
.widget-resize{
  position:absolute;right:0;bottom:0;width:16px;height:16px;cursor:se-resize;
  background:linear-gradient(135deg,transparent 50%,#2a2a2a 50%);border-radius:0 0 5px 0;touch-action:none;
}
.widget.minimized .widget-body,.widget.minimized .widget-resize{display:none}
.widget.minimized{height:30px!important;min-height:30px!important}
.widget.minimized .widget-titlebar{border-radius:5px;cursor:pointer}
.widget-loading{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:#050505;color:var(--dim);font-size:11px;gap:8px;z-index:5;
}
.widget-loading-spinner{
  width:20px;height:20px;border:2px solid #1a3a1a;border-top-color:var(--green);
  border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.widget-error{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:#050505;color:#ff4444;font-size:11px;padding:16px;
  text-align:center;gap:6px;z-index:5;
}
.widget-error-retry{
  background:none;border:1px solid #ff4444;color:#ff4444;font-family:'Courier New',monospace;
  font-size:10px;padding:4px 12px;cursor:pointer;margin-top:4px;
}
.widget-error-retry:hover{background:#1a0000}
.audio-player-wrap{display:flex;flex-direction:column;height:100%;background:#050505;padding:8px}
.audio-viz-canvas{flex:1;width:100%;display:block;min-height:0}
.audio-controls{display:flex;align-items:center;gap:6px;padding:6px 0 0;flex-shrink:0;flex-wrap:wrap}
.audio-btn{
  background:none;border:1px solid #222;color:var(--green);font-family:'Courier New',monospace;
  font-size:11px;padding:4px 10px;cursor:pointer;border-radius:2px;flex-shrink:0;
}
.audio-btn:hover,.audio-btn:active{border-color:var(--green);background:#0a1a0a}
.audio-seek{flex:1;min-width:60px;height:3px;background:#1a1a1a;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;border-radius:2px;}
.audio-seek::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:var(--green);border-radius:50%;cursor:pointer;}
.audio-time{color:var(--dim);font-size:10px;flex-shrink:0}
.audio-vol{width:60px;height:3px;background:#1a1a1a;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;border-radius:2px;flex-shrink:0;}
.audio-vol::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:var(--dim);border-radius:50%;cursor:pointer;}
.img-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#050505;overflow:auto;position:relative}
.img-wrap img{max-width:100%;max-height:100%;object-fit:contain;display:block;user-select:none}
.img-controls{position:absolute;bottom:8px;right:8px;display:flex;gap:4px}
.img-ctrl-btn{
  background:rgba(0,0,0,.7);border:1px solid #333;color:var(--dim);font-family:'Courier New',monospace;
  font-size:10px;padding:3px 8px;cursor:pointer;border-radius:2px;
}
.img-ctrl-btn:hover{border-color:var(--green);color:var(--green)}
.pdf-wrap{width:100%;height:100%;display:flex;flex-direction:column;background:#050505}
.pdf-toolbar{display:flex;align-items:center;gap:6px;padding:6px 8px;background:#0c0c0c;border-bottom:1px solid #1a1a1a;flex-shrink:0;flex-wrap:wrap;}
.pdf-btn{background:none;border:1px solid #222;color:var(--dim);font-family:'Courier New',monospace;font-size:10px;padding:3px 8px;cursor:pointer;border-radius:2px;flex-shrink:0;}
.pdf-btn:hover,.pdf-btn:active{border-color:var(--green);color:var(--green)}
.pdf-page-info{color:var(--dim);font-size:10px;flex:1;text-align:center}
.pdf-canvas-wrap{flex:1;overflow:auto;display:flex;justify-content:center;padding:8px;background:#1a1a1a}
.pdf-canvas-wrap canvas{display:block;box-shadow:0 4px 16px rgba(0,0,0,.5)}
.plot-controls{
  position:absolute;top:4px;right:4px;display:flex;flex-direction:column;gap:3px;
  z-index:10;background:rgba(10,10,10,.85);border:1px solid #1a1a1a;padding:6px;border-radius:3px;
}
.plot-ctrl-row{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--dim)}
.plot-ctrl-row label{white-space:nowrap;cursor:pointer;user-select:none}
.plot-ctrl-select,.plot-ctrl-input{background:#111;border:1px solid #222;color:var(--green);font-family:'Courier New',monospace;font-size:10px;padding:2px 4px;outline:none;border-radius:2px;cursor:pointer;}
.plot-ctrl-select{max-width:90px}
.plot-ctrl-color{width:28px;height:18px;padding:0;border-radius:2px;cursor:pointer;background:none}
.plot-ctrl-range{width:70px;cursor:pointer;accent-color:var(--green)}
.plot-toggle-btn{background:rgba(10,10,10,.85);border:1px solid #1a1a1a;color:var(--dim);font-family:'Courier New',monospace;font-size:9px;padding:2px 6px;cursor:pointer;border-radius:2px;position:absolute;top:4px;right:4px;z-index:11;}
.plot-toggle-btn:hover{border-color:var(--green);color:var(--green)}
.embed-fallback{
  width:100%;height:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:#050505;color:var(--dim);font-size:11px;padding:16px;text-align:center;gap:8px;
}
.embed-fallback a{color:var(--green);text-decoration:none}
.embed-fallback a:hover{text-decoration:underline}
.embed-fallback-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:4px}
.embed-fallback-btn{background:none;border:1px solid #333;color:var(--dim);font-family:'Courier New',monospace;font-size:10px;padding:5px 12px;cursor:pointer;border-radius:2px;}
.embed-fallback-btn:hover{border-color:var(--green);color:var(--green)}
.webview-toolbar{
  display:flex;align-items:center;gap:4px;padding:4px 8px;background:#0c0c0c;
  border-bottom:1px solid #1a1a1a;flex-shrink:0;
}
.webview-nav-btn{background:none;border:1px solid #222;color:var(--dim);font-family:'Courier New',monospace;font-size:10px;padding:2px 7px;cursor:pointer;border-radius:2px;flex-shrink:0;}
.webview-nav-btn:hover{border-color:var(--green);color:var(--green)}
.webview-url-bar{flex:1;background:#111;border:1px solid #1a1a1a;color:var(--green);font-family:'Courier New',monospace;font-size:10px;padding:3px 6px;outline:none;border-radius:2px;min-width:0;}
.webview-url-bar:focus{border-color:#333}
.draw-toolbar{
  display:flex;align-items:center;gap:5px;padding:5px 8px;background:#0c0c0c;
  border-bottom:1px solid #1a1a1a;flex-shrink:0;flex-wrap:wrap;
}
.draw-tool-btn{background:none;border:1px solid #222;color:var(--dim);font-family:'Courier New',monospace;font-size:10px;padding:3px 8px;cursor:pointer;border-radius:2px;flex-shrink:0;}
.draw-tool-btn:hover,.draw-tool-btn.active{border-color:var(--green);color:var(--green)}
.draw-size{width:50px;height:3px;background:#1a1a1a;cursor:pointer;-webkit-appearance:none;appearance:none;outline:none;border-radius:2px;flex-shrink:0;accent-color:var(--green);}
.draw-color{width:24px;height:20px;padding:0;border:1px solid #333;border-radius:2px;cursor:pointer;background:none;flex-shrink:0;}
.draw-canvas-wrap{flex:1;overflow:hidden;position:relative}
.draw-canvas{display:block;cursor:crosshair;touch-action:none}
.draw-coords{position:absolute;bottom:4px;right:8px;color:#333;font-size:9px;pointer-events:none;font-family:'Courier New',monospace;}
.peer-panel{
  width:100%;height:100%;display:flex;flex-direction:column;background:#050505;padding:10px;gap:8px;overflow-y:auto;
}
.peer-section{border:1px solid #1a1a1a;border-radius:3px;padding:8px;display:flex;flex-direction:column;gap:6px}
.peer-section-title{color:var(--peer-color);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;}
.peer-id-display{color:var(--green);font-size:12px;letter-spacing:1px;word-break:break-all}
.peer-input{
  background:#111;border:1px solid #222;color:var(--green);font-family:'Courier New',monospace;
  font-size:11px;padding:4px 8px;outline:none;border-radius:2px;width:100%;
}
.peer-input:focus{border-color:#333}
.peer-btn{background:none;border:1px solid #333;color:var(--dim);font-family:'Courier New',monospace;font-size:10px;padding:4px 12px;cursor:pointer;border-radius:2px;align-self:flex-start;}
.peer-btn:hover{border-color:var(--peer-color);color:var(--peer-color)}
.peer-msg-area{flex:1;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:2px;padding:6px;overflow-y:auto;font-size:11px;min-height:80px;max-height:160px;}
.peer-msg{margin-bottom:4px;word-break:break-word}
.peer-msg.local{color:var(--green)}.peer-msg.remote{color:var(--peer-color)}.peer-msg.sys{color:#555}
.peer-msg-row{display:flex;gap:6px;align-items:center}
.peer-msg-input{flex:1;background:#111;border:1px solid #222;color:var(--green);font-family:'Courier New',monospace;font-size:11px;padding:4px 8px;outline:none;border-radius:2px;}
.peer-msg-input:focus{border-color:#333}
.peer-share-area{display:flex;flex-direction:column;gap:4px}
.peer-conn-badge{display:inline-block;color:var(--peer-color);font-size:10px;padding:2px 6px;border:1px solid var(--peer-color);border-radius:2px;}
.peer-conn-badge.off{color:#444;border-color:#333}
.webgl-wrap{width:100%;height:100%;position:relative;overflow:hidden;background:#000}
.webgl-canvas{display:block;width:100%;height:100%}
.webgl-controls{position:absolute;top:4px;right:4px;z-index:10;background:rgba(0,0,0,.8);border:1px solid #1a1a1a;padding:6px;border-radius:3px;display:flex;flex-direction:column;gap:4px;}
.webgl-toggle{background:rgba(0,0,0,.8);border:1px solid #1a1a1a;color:var(--dim);font-family:'Courier New',monospace;font-size:9px;padding:2px 6px;cursor:pointer;border-radius:2px;position:absolute;top:4px;right:4px;z-index:11;}
.webgl-toggle:hover{border-color:var(--green);color:var(--green)}
.webgl-ctrl-row{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--dim)}
.webgl-ctrl-sel{background:#111;border:1px solid #222;color:var(--green);font-family:'Courier New',monospace;font-size:10px;padding:2px 4px;outline:none;border-radius:2px;max-width:100px;}
.webgl-fps{position:absolute;bottom:4px;left:6px;color:#333;font-size:9px;font-family:'Courier New',monospace;pointer-events:none}
#scanlines{
  position:fixed;top:36px;left:0;right:0;bottom:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);
}
@media(max-width:768px),(pointer:coarse){
  #terminal-wrap{bottom:88px}
  #widget-area{bottom:88px}
  #mobile-input-bar{display:flex}
  #input-row{display:none}
  .widget{min-width:calc(100vw - 24px);left:12px!important;max-width:calc(100vw - 24px)}
  .widget-resize{display:none}
  .wt-btn{width:14px;height:14px}
  #toolbar{padding:0 6px;gap:4px}
  .tb-btn{font-size:9px;padding:3px 6px}
}
@media(max-width:480px){
  :root{--fs:13px}
  #terminal{padding:6px 8px 80px}
  .widget{min-width:calc(100vw - 16px);left:8px!important}
}
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <span id="toolbar-title">renders</span>
    <button class="tb-btn" id="tb-open">[ open ]</button>
    <input type="file" id="file-input" accept="*/*" multiple>
    <button class="tb-btn" onclick="termCmd('show')">[ widgets ]</button>
    <button class="tb-btn" onclick="termCmd('clear')">[ clear ]</button>
    <button class="tb-btn" onclick="termCmd('help')">[ help ]</button>
    <button class="tb-btn" id="tb-widget-toggle">[ lay ]</button>
    <button class="tb-btn" id="tb-peer" onclick="termCmd('peer')">[ peer ]</button>
    <span id="peer-status">● offline</span>
  </div>
  <div id="terminal-wrap">
    <div id="terminal">
      <div id="output-area"></div>
      <div id="input-row">
        <span id="input-prefix">$ </span>
        <input id="input-field" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      </div>
    </div>
  </div>
  <div id="widget-area"></div>
</div>
<div id="mobile-input-bar">
  <div id="mobile-shortcuts">
    <button class="mob-key" data-key="Tab">tab</button>
    <button class="mob-key" data-key="ArrowUp">↑</button>
    <button class="mob-key" data-key="ArrowDown">↓</button>
    <button class="mob-key" data-ins="ls ">ls</button>
    <button class="mob-key" data-ins="cd ">cd</button>
    <button class="mob-key" data-ins="embed ">embed</button>
    <button class="mob-key" data-ins="webview ">webview</button>
    <button class="mob-key" data-ins="draw">draw</button>
    <button class="mob-key" data-ins="webgl ">webgl</button>
    <button class="mob-key" data-ins="peer">peer</button>
    <button class="mob-key" data-ins="plot ">plot</button>
    <button class="mob-key" data-ins="chart ">chart</button>
    <button class="mob-key" data-ctrl="c">^C</button>
    <button class="mob-key" data-ctrl="l">^L</button>
  </div>
  <div id="mobile-input-wrap">
    <span id="mobile-prefix">$ </span>
    <input id="mobile-field" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="command...">
    <button id="mobile-send">↵</button>
  </div>
</div>
<div id="scanlines"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
(function(){
'use strict';

const terminal=document.getElementById('terminal');
const outputArea=document.getElementById('output-area');
const inputField=document.getElementById('input-field');
const mobileField=document.getElementById('mobile-field');
const widgetArea=document.getElementById('widget-area');
const fileInput=document.getElementById('file-input');
const peerStatusEl=document.getElementById('peer-status');
const tbPeerBtn=document.getElementById('tb-peer');

let config={theme:'green',font_size:14,scrollback_lines:10000,animation_fps:60,mobile_layout:'stack'};
try{const s=localStorage.getItem('renders_config');if(s)Object.assign(config,JSON.parse(s));}catch(e){}
document.documentElement.style.setProperty('--fs',config.font_size+'px');

let cmdHistory=[];
let histIdx=-1;
let widgets={};
let widgetIdCounter=1;
let lastFocusedWidget=null;
let termFocused=true;
let importedFiles={};

let peerInstance=null;
let peerConn=null;
let peerMyId=null;
let peerConnected=false;

if(typeof pdfjsLib!=='undefined'){pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';}

const PROXY_URLS=[
  url=>`https://corsproxy.io/?${encodeURIComponent(url)}`,
  url=>`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,

function resolvePath(p){
  if(!p)return cwd;
  if(p==='~')return '/home/user';
  if(p.startsWith('~/'))p='/home/user/'+p.slice(2);
  if(!p.startsWith('/'))p=cwd.replace(/\/$/,'')+'/'+p;
  const parts=p.split('/').filter(Boolean);
  const res=[];
  for(const pt of parts){if(pt==='.')continue;if(pt==='..'){res.pop();}else res.push(pt);}
  return'/'+res.join('/');
}

function fsGet(p){
  p=resolvePath(p);
  if(p==='/')return{type:'d',children:Object.keys(fsTree).filter(k=>k!=='/'&&k.split('/').length===2).map(k=>k.slice(1))};
  return fs[p]||fsTree[p]||null;
}

function fsExists(p){return fsGet(p)!==null;}
function fsIsDir(p){const n=fsGet(p);return !!(n&&n.type==='d');}
function fsIsFile(p){const n=fsGet(p);return !!(n&&n.type==='f');}

function fsReadFile(p){
  p=resolvePath(p);const n=fs[p];
  if(!n||n.type!=='f')return null;
  return n.content||'';
}

function fsWriteFile(p,content,append=false){
  p=resolvePath(p);
  if(fs[p]&&fs[p].type==='d')return false;
  if(append&&fs[p]&&fs[p].type==='f'){fs[p].content=(fs[p].content||'')+content;}
  else fs[p]={type:'f',content:content};
  const dir=p.substring(0,p.lastIndexOf('/')||0)||'/';
  const base=p.substring(p.lastIndexOf('/')+1);
  if(fsTree[dir]&&!fsTree[dir].children.includes(base))fsTree[dir].children.push(base);
  return true;
}

function fsMkdir(p){
  p=resolvePath(p);if(fsExists(p))return false;
  fsTree[p]={type:'d',children:[]};
  const dir=p.substring(0,p.lastIndexOf('/')||0)||'/';
  const base=p.substring(p.lastIndexOf('/')+1);
  if(fsTree[dir]&&!fsTree[dir].children.includes(base))fsTree[dir].children.push(base);
  return true;
}

function fsListDir(p){
  p=resolvePath(p);const node=fsTree[p];
  if(!node||node.type!=='d')return null;
  return node.children||[];
}

function fsDelete(p){
  p=resolvePath(p);
  const dir=p.substring(0,p.lastIndexOf('/')||0)||'/';
  const base=p.substring(p.lastIndexOf('/')+1);
  delete fs[p];delete fsTree[p];
  if(fsTree[dir])fsTree[dir].children=fsTree[dir].children.filter(c=>c!==base);
  return true;
}

function parseArgs(str){
  const args=[];let cur='';let inQ=false;let qChar='';
  for(let i=0;i<str.length;i++){
    const c=str[i];
    if(inQ){if(c===qChar){inQ=false;}else cur+=c;}
    else if(c==='"'||c==="'"){inQ=true;qChar=c;}
    else if(c===' '){if(cur.length){args.push(cur);cur='';}}
    else cur+=c;
  }
  if(cur.length)args.push(cur);
  return args;
}

function parsePipes(line){
  const segs=[];let cur='';let inQ=false;let qC='';
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(inQ){if(c===qC)inQ=false;else cur+=c;}
    else if(c==='"'||c==="'"){inQ=true;qC=c;}
    else if(c==='|'){segs.push(cur.trim());cur='';}
    else cur+=c;
  }
  segs.push(cur.trim());return segs.filter(Boolean);
}

function parseRedirect(line){
  let stdout=null;let append=false;let input=null;
  line=line.replace(/>>([^\s]+)/g,(_,f)=>{stdout=f;append=true;return '';});
  line=line.replace(/>([^\s]+)/g,(_,f)=>{stdout=f;return '';});
  line=line.replace(/<([^\s]+)/g,(_,f)=>{input=f;return '';});
  return{cmd:line.trim(),stdout,append,input};
}

function executeCommand(rawLine){
  rawLine=rawLine.trim();if(!rawLine)return;
  if(rawLine.toLowerCase()!=='history'){
    cmdHistory.unshift(rawLine);if(cmdHistory.length>1000)cmdHistory.pop();
  }
  histIdx=-1;
  let line=rawLine;let background=false;
  if(line.endsWith('&')){background=true;line=line.slice(0,-1).trim();}
  const pipes=parsePipes(line);
  if(pipes.length>1){
    let pipedOut='';
    for(let i=0;i<pipes.length;i++){
      const seg=pipes[i];const r=parseRedirect(seg);const a=parseArgs(r.cmd);if(!a.length)continue;
      const res=runBuiltin(a[0],a.slice(1),{input:i===0?'':pipedOut,pipe:true});
      pipedOut=res.output||'';if(res.err&&i===pipes.length-1)print(res.err,'t-error');
    }
    if(pipedOut)print(pipedOut);return;
  }
  const r=parseRedirect(line);const a=parseArgs(r.cmd);if(!a.length)return;
  const cmd=a[0];const args=a.slice(1);let stdinData=null;
  if(r.input){
    stdinData=fsReadFile(r.input);
    if(stdinData===null){print('bash: '+r.input+': No such file or directory','t-error');return;}
  }
  const res=runBuiltin(cmd,args,{input:stdinData,pipe:false,background});
  if(r.stdout){
    fsWriteFile(r.stdout,res.output||'',r.append);if(res.err)print(res.err,'t-error');
  } else {
    if(res.output!=null&&res.output!=='')print(res.output);
    if(res.err)print(res.err,'t-error');
  }
}

function doEcho(args){
  let noNewline=false;let interpret=false;const filtered=[];
  for(const a of args){
    if(a==='-n')noNewline=true;
    else if(a==='-e')interpret=true;
    else filtered.push(a);
  }
  let text=filtered.join(' ');
  if(interpret)text=text.replace(/\\n/g,'\n').replace(/\\t/g,'\t').replace(/\\r/g,'\r').replace(/\\\\/g,'\\');
  return{output:text};
}

function doPrintf(args){
  if(!args.length)return{err:'printf: usage: printf format [arguments ...]'};
  let fmt=args[0];let i=1;
  const result=fmt.replace(/%(d|s|f|i|o|x|X|c|%)/g,(m,spec)=>{
    if(spec==='%')return'%';const val=args[i++]||'';
    if(spec==='d'||spec==='i')return parseInt(val)||0;
    if(spec==='f')return parseFloat(val)||0;
    if(spec==='o')return(parseInt(val)||0).toString(8);
    if(spec==='x')return(parseInt(val)||0).toString(16);
    if(spec==='X')return(parseInt(val)||0).toString(16).toUpperCase();
    if(spec==='c')return val[0]||'';
    return val;
  });
  return{output:result.replace(/\\n/g,'\n').replace(/\\t/g,'\t').replace(/\\\\/g,'\\')};
}

function doLs(args){
  let long=false;let all=false;let path=cwd;let human=false;
  for(const a of args){
    if(a==='-l')long=true;else if(a==='-a')all=true;else if(a==='-h')human=true;
    else if(/^-[lah]+$/.test(a)){if(a.includes('l'))long=true;if(a.includes('a'))all=true;if(a.includes('h'))human=true;}
    else if(!a.startsWith('-'))path=a;
  }
  path=resolvePath(path);
  if(!fsIsDir(path))return{err:'ls: cannot access \''+path+'\': No such file or directory'};
  const children=fsListDir(path)||[];
  const entries=all?['.','..'].concat(children):children.filter(c=>!c.startsWith('.'));
  if(!entries.length)return{output:''};
  if(long){
    const now=new Date();const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const lines=entries.map(e=>{
      const fp=path==='/'?'/'+e:path+'/'+e;const node=fsGet(fp);const isDir=node&&node.type==='d';
      const perm=isDir?'drwxr-xr-x':'-rw-r--r--';
      const raw=isDir?4096:(node&&node.content?node.content.length:0);
      const size=human?(raw>1048576?(raw/1048576).toFixed(1)+'M':raw>1024?(raw/1024).toFixed(1)+'K':raw+'B'):String(raw);
      const month=months[now.getMonth()];const day=String(now.getDate()).padStart(2);
      const isImport=importedFiles[fp]?'*':'';
      return perm+' 1 user user '+size.padStart(human?5:8)+' '+month+' '+day+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+' '+e+(isDir?'/':'')+isImport;
    });
    return{output:lines.join('\n')};
  }
  return{output:entries.join('  ')};
}

function doCd(args){
  const target=args[0]||'/home/user';const p=resolvePath(target);
  if(!fsIsDir(p))return{err:'bash: cd: '+target+': No such file or directory'};
  cwd=p;envVars.PWD=p;
  const prefix=document.getElementById('input-prefix');const mprefix=document.getElementById('mobile-prefix');
  const shortCwd=p.replace('/home/user','~');const ps1='[user@renders '+shortCwd+']$ ';
  if(prefix)prefix.textContent=ps1;if(mprefix)mprefix.textContent=ps1;
  return{output:''};
}

function doCat(args,input){
  const files=args.filter(a=>!a.startsWith('-'));
  if(!files.length){return{output:input||''};}
  const parts=[];
  for(const f of files){
    const p=resolvePath(f);const c=fsReadFile(p);
    if(c===null)parts.push('cat: '+f+': No such file or directory');
    else parts.push(c);
  }
  return{output:parts.join('\n')};
}

function doMkdir(args){
  const p=args.find(a=>!a.startsWith('-'));
  if(!p)return{err:'mkdir: missing operand'};
  const resolved=resolvePath(p);
  if(fsExists(resolved))return{err:'mkdir: cannot create directory \''+p+'\': File exists'};
  fsMkdir(resolved);return{output:''};
}

function doRm(args){
  const recursive=args.includes('-r')||args.includes('-rf')||args.includes('-R');
  const files=args.filter(a=>!a.startsWith('-'));
  for(const f of files){
    const p=resolvePath(f);
    if(!fsExists(p)){print('rm: cannot remove \''+f+'\': No such file or directory','t-error');continue;}
    if(fsIsDir(p)&&!recursive){print('rm: cannot remove \''+f+'\': Is a directory','t-error');continue;}
    fsDelete(p);
  }
  return{output:''};
}

function doMv(args){
  const f=args.filter(a=>!a.startsWith('-'));
  if(f.length<2)return{err:'mv: missing operand'};
  const src=resolvePath(f[0]);const dst=resolvePath(f[1]);
  if(!fsExists(src))return{err:'mv: cannot stat \''+f[0]+'\': No such file or directory'};
  if(fsIsFile(src)){const c=fsReadFile(src);fsWriteFile(dst,c||'');fsDelete(src);}
  else if(fsIsDir(src)){fsTree[dst]=fsTree[src];delete fsTree[src];}
  return{output:''};
}

function doCp(args){
  const f=args.filter(a=>!a.startsWith('-'));
  if(f.length<2)return{err:'cp: missing operand'};
  const src=resolvePath(f[0]);const dst=resolvePath(f[1]);
  if(!fsExists(src))return{err:'cp: cannot stat \''+f[0]+'\': No such file or directory'};
  const c=fsReadFile(src);fsWriteFile(dst,c||'');return{output:''};
}

function doTouch(args){
  for(const a of args.filter(a=>!a.startsWith('-'))){
    const p=resolvePath(a);if(!fsExists(p))fsWriteFile(p,'');
  }
  return{output:''};
}

function doLn(args){
  const f=args.filter(a=>!a.startsWith('-'));
  if(f.length<2)return{err:'ln: missing operand'};
  const src=resolvePath(f[0]);const dst=resolvePath(f[1]);
  if(!fsExists(src))return{err:'ln: failed to access \''+f[0]+'\': No such file or directory'};
  const c=fsReadFile(src);if(c!==null)fsWriteFile(dst,c);return{output:''};
}

function doReadlink(args){
  const f=args.find(a=>!a.startsWith('-'));
  if(!f)return{err:'readlink: missing operand'};
  return{output:resolvePath(f)};
}

function doStat(args){
  const f=args.find(a=>!a.startsWith('-'));
  if(!f)return{err:'stat: missing operand'};
  const p=resolvePath(f);if(!fsExists(p))return{err:'stat: cannot stat \''+f+'\': No such file or directory'};
  const n=fsGet(p);const isDir=n&&n.type==='d';
  const size=isDir?4096:(n&&n.content?n.content.length:0);
  return{output:`File: ${p}\nSize: ${size}\nType: ${isDir?'directory':'regular file'}\nAccess: ${isDir?'drwxr-xr-x':'-rw-r--r--'}\nUid: 1000/user  Gid: 1000/user`};
}

function doGrep(args,input){
  let ignoreCase=false;let lineNum=false;let invertMatch=false;let count=false;
  const positional=[];
  for(const a of args){
    if(a==='-i')ignoreCase=true;else if(a==='-n')lineNum=true;else if(a==='-v')invertMatch=true;
    else if(a==='-c')count=true;else if(!a.startsWith('-'))positional.push(a);
  }
  if(!positional.length)return{err:'grep: missing pattern'};
  const pattern=positional[0];const files=positional.slice(1);
  let content=files.length?files.map(f=>{const p=resolvePath(f);const c=fsReadFile(p);return c===null?'':c;}).join('\n'):input||'';
  let flags=ignoreCase?'i':'';
  let re;try{re=new RegExp(pattern,flags);}catch(e){return{err:'grep: invalid expression: '+e.message};}
  const lines=content.split('\n');
  const matched=lines.filter((l,i)=>invertMatch?!re.test(l):re.test(l));
  if(count)return{output:String(matched.length)};
  if(lineNum){
    const res=[];lines.forEach((l,i)=>{if(invertMatch?!re.test(l):re.test(l))res.push((i+1)+':'+l);});
    return{output:res.join('\n')};
  }
  return{output:matched.join('\n')};
}

function doHead(args,input){

function doSort(args,input){

function doUniq(args,input){
  const count=args.includes('-c');const dup=args.includes('-d');
  const files=args.filter(a=>!a.startsWith('-'));
  const content=files.length?fsReadFile(resolvePath(files[0]))||'':input||'';
  const lines=content.split('\n');
  const result=[];let last=null;let cnt=0;
  for(const l of lines){
    if(l===last){cnt++;}else{
      if(last!==null){
        if(!dup||(dup&&cnt>1))result.push((count?' '+cnt+'\t':'')+last);
      }
      last=l;cnt=1;
    }
  }
  if(last!==null&&(!dup||(dup&&cnt>1)))result.push((count?' '+cnt+'\t':'')+last);
  return{output:result.join('\n')};
}

function doCut(args,input){
  let delim='\t';let fields=null;
  for(let i=0;i<args.length;i++){
    if(args[i]==='-d'&&args[i+1]){delim=args[i+1];i++;}
    else if(args[i].startsWith('-d'))delim=args[i].slice(2);
    else if(args[i]==='-f'&&args[i+1]){fields=args[i+1];i++;}
    else if(args[i].startsWith('-f'))fields=args[i].slice(2);
  }
  const files=args.filter(a=>!a.startsWith('-'));
  const content=files.length?fsReadFile(resolvePath(files[0]))||'':input||'';
  if(!fields)return{output:content};
  const fNums=fields.split(',').map(f=>{const parts=f.split('-');return parts.length===2?{from:parseInt(parts[0])-1,to:parseInt(parts[1])-1}:{idx:parseInt(f)-1};});
  const lines=content.split('\n').map(l=>{
    const cols=l.split(delim);
    const out=[];
    for(const fn of fNums){if('idx' in fn){if(cols[fn.idx]!==undefined)out.push(cols[fn.idx]);}else{out.push(...cols.slice(fn.from,fn.to+1));}}
    return out.join(delim);
  });
  return{output:lines.join('\n')};
}

function doPaste(args,input){

  const maxLen=Math.max(...cols.map(c=>c.length));
  const lines=[];
  for(let i=0;i<maxLen;i++)lines.push(cols.map(c=>c[i]||'').join('\t'));
  return{output:lines.join('\n')};
}

function doTr(args,input){

function doSed(args,input){

function doAwk(args,input){

function doFind(args){
  const path=args.find(a=>!a.startsWith('-'))||'.';const p=resolvePath(path);
  const nameArg=args.indexOf('-name');const namePat=nameArg>=0?args[nameArg+1]:null;
  const typeArg=args.indexOf('-type');const typeVal=typeArg>=0?args[typeArg+1]:null;
  const results=[];
  function walk(dir){
    const children=fsListDir(dir)||[];
    for(const c of children){
      const fp=dir==='/'?'/'+c:dir+'/'+c;const node=fsGet(fp);
      const isDir=node&&node.type==='d';
      if(namePat){const re=new RegExp('^'+namePat.replace(/\*/g,'.*').replace(/\?/g,'.')+'$');if(!re.test(c))continue;}
      if(typeVal){if(typeVal==='f'&&isDir)continue;if(typeVal==='d'&&!isDir)continue;}
      results.push(fp);if(isDir)walk(fp);
    }
  }
  walk(p);return{output:results.join('\n')};
}

function doFile(args){
  const results=[];
  for(const a of args.filter(a=>!a.startsWith('-'))){
    const p=resolvePath(a);if(!fsExists(p)){results.push(a+': No such file');continue;}
    if(fsIsDir(p)){results.push(a+': directory');continue;}
    const c=fsReadFile(p)||'';
    let type='ASCII text';
    if(c.includes('\0'))type='data';
    else if(c.startsWith('#!/'))type='shell script';
    else if(c.startsWith('{'))type='JSON data';
    else if(c.startsWith('<'))type='HTML document';
    results.push(a+': '+type);

}

function simpleHash(str,len){
  let h1=0x9e3779b9,h2=0x243f6a88;
  for(let i=0;i<str.length;i++){h1=(h1^str.charCodeAt(i))*0x5bd1e995;h1^=h1>>>13;h2=(h2^str.charCodeAt(i))*0x85ebca6b;h2^=h2>>>15;}
  return((h1>>>0).toString(16).padStart(8,'0')+(h2>>>0).toString(16).padStart(8,'0')).repeat(Math.ceil(len/16)).slice(0,len);
}

function parseWidgetArgs(args){

  }

}

function resolveMediaUrl(input){
  if(!input)return null;
  if(input.startsWith('http')||input.startsWith('blob:')||input.startsWith('data:'))return input;
  const importPath='/imports/'+input;
  if(importedFiles[importPath])return importedFiles[importPath];
  const resolved=resolvePath(input);
  if(importedFiles[resolved])return importedFiles[resolved];
  const fsContent=fsReadFile(resolved);
  if(fsContent)return 'data:text/plain;base64,'+btoa(fsContent);
  return input;
}

function getImportedMime(url){
  const fsPath='/imports/'+url;
  if(fs[fsPath]&&fs[fsPath].mimeType)return fs[fsPath].mimeType;
  const resolved=resolvePath(url);
  if(fs[resolved]&&fs[resolved].mimeType)return fs[resolved].mimeType;
  return '';
}

  if(/\.(mp3|wav|flac|aac|m4a|opus)$/i.test(url)||/^audio\//i.test(getImportedMime(url)))return doAudio([resolved||url]);
  if(/\.(jpg|jpeg|png|gif|webp|svg|bmp|avif)$/i.test(url)||/^image\//i.test(getImportedMime(url)))return doImage([resolved||url]);
  if(/\.pdf$/i.test(url)||/application\/pdf/i.test(getImportedMime(url)))return doPdf([resolved||url]);
  if(/\.(html|htm)$/i.test(url))return doHtml([resolved||url]);

  fwdBtn.onclick=()=>{if(histPos<history.length-1){histPos++;navigate(history[histPos]);}};
  reloadBtn.onclick=()=>{embedArea.innerHTML='';buildSmartEmbed(embedArea,currentUrl,widgetId,'webview');};

function buildSmartEmbed(container,url,widgetId,type){
  container.innerHTML='';
  const loading=makeLoadingEl('Connecting...');
  container.appendChild(loading);
  let proxyIdx=0;
  const isLocalHtml=url.startsWith('blob:')||url.startsWith('data:')||url.startsWith('about:');

  function tryIframe(src,sandbox){
    return new Promise((resolve,reject)=>{
      const iframe=document.createElement('iframe');
      iframe.style.cssText='width:100%;height:100%;border:none;display:block;background:#fff;';
      iframe.sandbox=sandbox||'allow-scripts allow-same-origin allow-forms allow-popups allow-presentation allow-downloads';
      iframe.allow='autoplay; fullscreen; clipboard-read; clipboard-write; camera; microphone';
      iframe.referrerpolicy='no-referrer';
      let done=false;
      const timer=setTimeout(()=>{if(!done){done=true;reject(new Error('timeout'));}},9000);
      iframe.onload=()=>{
        clearTimeout(timer);if(done)return;done=true;
        try{
          const doc=iframe.contentDocument||iframe.contentWindow&&iframe.contentWindow.document;
          if(doc&&doc.body&&doc.body.innerHTML.length<20){reject(new Error('empty'));return;}
        }catch(e){}
        resolve(iframe);
      };
      iframe.onerror=()=>{clearTimeout(timer);if(!done){done=true;reject(new Error('iframe error'));}};
      iframe.src=src;
      container.appendChild(iframe);
    });
  }

  function tryFetchProxy(proxyFn){
    return new Promise((resolve,reject)=>{
      const proxiedUrl=proxyFn(url);
      fetch(proxiedUrl,{signal:AbortSignal.timeout?AbortSignal.timeout(8000):undefined}).then(r=>{
        if(!r.ok)throw new Error('HTTP '+r.status);
        return r.text();
      }).then(html=>{
        container.innerHTML='';
        const iframe=document.createElement('iframe');
        iframe.style.cssText='width:100%;height:100%;border:none;display:block;background:#fff;';
        iframe.sandbox='allow-scripts allow-forms allow-same-origin';
        const rewrittenHtml=rewriteHtmlLinks(html,url);
        iframe.srcdoc=rewrittenHtml;
        iframe.onload=()=>resolve(iframe);
        iframe.onerror=()=>reject(new Error('srcdoc error'));
        container.appendChild(iframe);
      }).catch(reject);
    });
  }

  function rewriteHtmlLinks(html,base){
    try{
      const baseUrl=new URL(base);
      const origin=baseUrl.origin;
      html=html.replace(/<base[^>]*>/gi,'');
      html=html.replace(/(<head[^>]*>)/i,'$1<base href="'+base+'">');
      html=html.replace(/(href|src|action)=["'](?!https?:|\/\/|#|data:|blob:|javascript:)([^"']*)['"]/gi,(m,attr,path)=>{
        try{return attr+'="'+new URL(path,base).href+'"';}catch(e){return m;}
      });
      html=html.replace(/url\((?!["']?(?:https?:|\/\/|data:|blob:))["']?([^)"']+)["']?\)/gi,(m,path)=>{
        try{return'url("'+new URL(path,base).href+'")';}catch(e){return m;}
      });
      return html;
    }catch(e){return html;}
  }

  function showFallback(reason){
    container.innerHTML='';
    const fb=document.createElement('div');fb.className='embed-fallback';
    const shortUrl=url.length>55?url.slice(0,55)+'...':url;
    fb.innerHTML=`<div>⚠ Cannot embed</div><a href="${url}" target="_blank" rel="noopener noreferrer" style="word-break:break-all;max-width:260px;display:block">${shortUrl}</a><div style="font-size:10px;color:#444;margin-top:2px">${reason||'X-Frame-Options or network blocked'}</div>`;
    const btns=document.createElement('div');btns.className='embed-fallback-btns';
    const openBtn=document.createElement('button');openBtn.className='embed-fallback-btn';openBtn.textContent='open in tab';
    openBtn.onclick=()=>window.open(url,'_blank','noopener,noreferrer');
    const retryBtn=document.createElement('button');retryBtn.className='embed-fallback-btn';retryBtn.textContent='retry';
    retryBtn.onclick=()=>buildSmartEmbed(container,url,widgetId,type);
    const proxyBtn=document.createElement('button');proxyBtn.className='embed-fallback-btn';proxyBtn.textContent='try proxy';
    proxyBtn.onclick=()=>{
      container.innerHTML='';container.appendChild(makeLoadingEl('Fetching via proxy...'));
      tryFetchProxy(PROXY_URLS[0]).then(()=>{}).catch(()=>{showFallback('All proxies failed');});
    };
    btns.appendChild(openBtn);btns.appendChild(proxyBtn);btns.appendChild(retryBtn);fb.appendChild(btns);container.appendChild(fb);
  }

  if(isLocalHtml){
    tryIframe(url).then(el=>{loading.remove();}).catch(()=>showFallback());
    return;
  }

  tryIframe(url).then(el=>{loading.remove();}).catch(()=>{
    container.innerHTML='';container.appendChild(makeLoadingEl('Trying proxy...'));
    const tryNextProxy=idx=>{
      if(idx>=PROXY_URLS.length){showFallback();return;}
      tryFetchProxy(PROXY_URLS[idx]).then(el=>{loading.remove&&loading.remove();}).catch(()=>tryNextProxy(idx+1));
    };
    tryNextProxy(0);
  });
}

function setupAudioWidget(body,url,id){
  const wrap=document.createElement('div');wrap.className='audio-player-wrap';

  const seekBar=document.createElement('input');seekBar.type='range';seekBar.className='audio-seek';seekBar.min=0;seekBar.max=100;seekBar.value=0;seekBar.step=0.1;

  const volBar=document.createElement('input');volBar.type='range';volBar.className='audio-vol';volBar.min=0;volBar.max=1;volBar.step=0.01;volBar.value=1;
  controls.appendChild(playBtn);controls.appendChild(stopBtn);controls.appendChild(seekBar);controls.appendChild(timeDisp);controls.appendChild(volBar);
  wrap.appendChild(canvas);wrap.appendChild(controls);body.appendChild(wrap);
  let actx=null;let source=null;let analyser=null;let audioEl=null;let rafId=null;let playing=false;let seeking=false;
  function fmt(t){const m=Math.floor(t/60);const s=Math.floor(t%60);return m+':'+(s<10?'0':'')+s;}
  function cleanup(){if(rafId){cancelAnimationFrame(rafId);rafId=null;}if(audioEl){audioEl.pause();audioEl.src='';}if(actx){try{actx.close();}catch(e){}}}
  if(widgets[id])widgets[id].cleanup=cleanup;
  function drawViz(){
    if(!canvas.isConnected){cancelAnimationFrame(rafId);return;}
    const w=canvas.offsetWidth;const h=canvas.offsetHeight;
    if(canvas.width!==w||canvas.height!==h){canvas.width=w;canvas.height=h;}
    const ctx=canvas.getContext('2d');ctx.fillStyle='#050505';ctx.fillRect(0,0,w,h);
    if(analyser){
      const buf=new Uint8Array(analyser.frequencyBinCount);analyser.getByteFrequencyData(buf);
      const bw=w/buf.length;
      for(let i=0;i<buf.length;i++){
        const bh=(buf[i]/255)*h*0.95;const g=Math.min(255,Math.floor((buf[i]/255)*220)+30);const r=Math.floor(buf[i]/255*40);
        ctx.fillStyle=`rgb(${r},${g},0)`;ctx.fillRect(i*bw,h-bh,Math.max(1,bw-1),bh);
      }
    } else {
      ctx.strokeStyle='#1a3a1a';ctx.lineWidth=1;ctx.beginPath();
      for(let x=0;x<w;x+=4){const y=h/2+Math.sin(x*0.05+Date.now()*0.001)*2;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
      ctx.stroke();
    }
    rafId=requestAnimationFrame(drawViz);
  }
  drawViz();
  function initAudio(){
    if(actx)return;actx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=actx.createAnalyser();analyser.fftSize=512;
    audioEl=new Audio();audioEl.crossOrigin='anonymous';audioEl.src=url;audioEl.volume=parseFloat(volBar.value);
    source=actx.createMediaElementSource(audioEl);source.connect(analyser);analyser.connect(actx.destination);
    audioEl.ontimeupdate=()=>{if(!seeking){const pct=audioEl.duration?audioEl.currentTime/audioEl.duration*100:0;seekBar.value=pct;timeDisp.textContent=fmt(audioEl.currentTime)+' / '+fmt(audioEl.duration||0);}};
    audioEl.onended=()=>{playing=false;playBtn.textContent='▶';seekBar.value=0;};
    audioEl.onerror=()=>{playing=false;playBtn.textContent='▶';timeDisp.textContent='error';};
  }
  playBtn.addEventListener('click',()=>{initAudio();if(actx.state==='suspended')actx.resume();if(playing){audioEl.pause();playBtn.textContent='▶';playing=false;}else{audioEl.play().catch(e=>print('audio: '+e.message,'t-error'));playBtn.textContent='⏸';playing=true;}});
  stopBtn.addEventListener('click',()=>{if(audioEl){audioEl.pause();audioEl.currentTime=0;}playBtn.textContent='▶';playing=false;seekBar.value=0;timeDisp.textContent='0:00 / 0:00';});
  seekBar.addEventListener('mousedown',()=>seeking=true);
  seekBar.addEventListener('touchstart',()=>seeking=true,{passive:true});
  seekBar.addEventListener('input',()=>{if(audioEl&&audioEl.duration)audioEl.currentTime=(seekBar.value/100)*audioEl.duration;});
  seekBar.addEventListener('mouseup',()=>seeking=false);
  seekBar.addEventListener('touchend',()=>seeking=false);
  volBar.addEventListener('input',()=>{if(audioEl)audioEl.volume=parseFloat(volBar.value);});
}

function buildPdfViewer(container,url,widgetId){
  if(typeof pdfjsLib==='undefined'){
    const fb=document.createElement('div');fb.className='embed-fallback';fb.innerHTML='<div>PDF.js not loaded</div>';
    container.appendChild(fb);
    setTimeout(()=>{container.innerHTML='';buildSmartEmbed(container,url,widgetId,'pdf');},500);
    return;
  }
  const wrap=document.createElement('div');wrap.className='pdf-wrap';
  const toolbar=document.createElement('div');toolbar.className='pdf-toolbar';
  const prevBtn=document.createElement('button');prevBtn.className='pdf-btn';prevBtn.textContent='◀ prev';
  const nextBtn=document.createElement('button');nextBtn.className='pdf-btn';nextBtn.textContent='next ▶';
  const pageInfo=document.createElement('span');pageInfo.className='pdf-page-info';pageInfo.textContent='Loading...';
  const zoomInBtn=document.createElement('button');zoomInBtn.className='pdf-btn';zoomInBtn.textContent='zoom +';
  const zoomOutBtn=document.createElement('button');zoomOutBtn.className='pdf-btn';zoomOutBtn.textContent='zoom -';
  const fitBtn=document.createElement('button');fitBtn.className='pdf-btn';fitBtn.textContent='fit';
  toolbar.appendChild(prevBtn);toolbar.appendChild(pageInfo);toolbar.appendChild(nextBtn);toolbar.appendChild(zoomInBtn);toolbar.appendChild(zoomOutBtn);toolbar.appendChild(fitBtn);
  const canvasWrap=document.createElement('div');canvasWrap.className='pdf-canvas-wrap';
  const canvas=document.createElement('canvas');canvasWrap.appendChild(canvas);
  wrap.appendChild(toolbar);wrap.appendChild(canvasWrap);container.appendChild(wrap);
  let pdfDoc=null;let pageNum=1;let scale=1.2;let rendering=false;let pendingPage=null;
  function renderPage(n){
    if(rendering){pendingPage=n;return;}rendering=true;
    pdfDoc.getPage(n).then(page=>{const vp=page.getViewport({scale});canvas.height=vp.height;canvas.width=vp.width;return page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;}).then(()=>{rendering=false;pageInfo.textContent='Page '+pageNum+' / '+pdfDoc.numPages;if(pendingPage){const p=pendingPage;pendingPage=null;pageNum=p;renderPage(p);}}).catch(e=>{rendering=false;pageInfo.textContent='Error: '+e.message;});
  }
  prevBtn.onclick=()=>{if(pdfDoc&&pageNum>1){pageNum--;renderPage(pageNum);}};
  nextBtn.onclick=()=>{if(pdfDoc&&pageNum<pdfDoc.numPages){pageNum++;renderPage(pageNum);}};
  zoomInBtn.onclick=()=>{scale=Math.min(scale*1.2,4);if(pdfDoc)renderPage(pageNum);};
  zoomOutBtn.onclick=()=>{scale=Math.max(scale/1.2,0.3);if(pdfDoc)renderPage(pageNum);};
  fitBtn.onclick=()=>{if(pdfDoc){pdfDoc.getPage(pageNum).then(page=>{const vp=page.getViewport({scale:1});scale=(canvasWrap.offsetWidth-32)/vp.width;renderPage(pageNum);});}};
  const loading=makeLoadingEl('Loading PDF...');container.insertBefore(loading,wrap);
  pdfjsLib.getDocument({url,isEvalSupported:false}).promise.then(doc=>{loading.remove();pdfDoc=doc;pageInfo.textContent='Page 1 / '+doc.numPages;renderPage(1);}).catch(e=>{loading.remove();container.innerHTML='';const err=document.createElement('div');err.className='widget-error';err.innerHTML='<div>⚠ PDF failed</div><div style="font-size:10px;color:#666;margin-top:4px">'+e.message+'</div>';const retry=document.createElement('button');retry.className='widget-error-retry';retry.textContent='retry with iframe';retry.onclick=()=>{container.innerHTML='';buildSmartEmbed(container,url,widgetId,'pdf');};err.appendChild(retry);container.appendChild(err);});
}

function setupPlot(canvas,id,opts){
  const labels=Array.from({length:300},(_,i)=>i);let phase=0;
  const fn=opts.fn||'sin';const freq=parseFloat(opts.freq)||1;const amp=parseFloat(opts.amp)||1;
  let color=opts.color||'#00ff00';const bg=opts.bg||'#050505';
  function getWave(x,p){
    const t=(x/300)*Math.PI*4*freq+p;
    switch(fn){case 'cos':return Math.cos(t)*amp;case 'tan':return Math.max(-2,Math.min(2,Math.tan(t)*0.3))*amp;case 'sawtooth':return((t/(Math.PI))%2-1)*amp;case 'square':return(Math.sin(t)>0?1:-1)*amp;case 'noise':return(Math.random()*2-1)*amp;default:return Math.sin(t)*amp;}
  }
  const chart=new Chart(canvas,{type:'line',data:{labels,datasets:[{label:fn,data:labels.map(x=>getWave(x,0)),borderColor:color,borderWidth:1.5,pointRadius:0,tension:0.2,fill:false}]},options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{min:-2.2,max:2.2,ticks:{color:'#006600',font:{size:9}},grid:{color:'#0a1a0a'}}}}});
  let rafId=null;
  function animate(){if(!canvas.isConnected){cancelAnimationFrame(rafId);chart.destroy();return;}phase+=0.04;chart.data.datasets[0].data=labels.map(x=>getWave(x,phase));chart.update('none');rafId=requestAnimationFrame(animate);}
  animate();
  if(widgets[id]){widgets[id].cleanup=()=>{if(rafId)cancelAnimationFrame(rafId);chart.destroy();};widgets[id]._chart=chart;widgets[id]._chartOpts=opts;}
}

function setupGraphWidget(canvas,id,opts){
  const fn=opts.fn||'lissajous';let color=opts.color||'#00ff00';const POINTS=300;let t=0;
  function makePoints(){
    return Array.from({length:POINTS},(_,i)=>{
      const a=(i/POINTS)*Math.PI*2;
      switch(fn){
        case 'spiral':{const r=a/(Math.PI*2)*0.8+t*0.01%1;return{x:r*Math.cos(a*3+t)*2,y:r*Math.sin(a*3+t)*2};}
        case 'rose':{const k=3;const r=Math.cos(k*a+t);return{x:r*Math.cos(a),y:r*Math.sin(a)};}
        case 'butterfly':{const r=Math.exp(Math.cos(a))-2*Math.cos(4*a+t)+Math.pow(Math.sin((2*a-Math.PI)/24),5);return{x:r*Math.cos(a)*0.4,y:r*Math.sin(a)*0.4};}
        default:{return{x:Math.cos(a+t)*1.5,y:Math.sin(2*a+t)*1.5};}
      }
    });
  }
  const chart=new Chart(canvas,{type:'scatter',data:{datasets:[{label:fn,data:makePoints(),backgroundColor:color+'cc',borderColor:color,pointRadius:2,pointBorderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false}},scales:{x:{min:-2.5,max:2.5,type:'linear',ticks:{color:'#006600',font:{size:9}},grid:{color:'#0a1a0a'}},y:{min:-2.5,max:2.5,ticks:{color:'#006600',font:{size:9}},grid:{color:'#0a1a0a'}}}}});
  let rafId=null;
  function animate(){if(!canvas.isConnected){cancelAnimationFrame(rafId);chart.destroy();return;}t+=0.025;chart.data.datasets[0].data=makePoints();chart.update('none');rafId=requestAnimationFrame(animate);}
  animate();
  if(widgets[id]){widgets[id].cleanup=()=>{if(rafId)cancelAnimationFrame(rafId);chart.destroy();};}
}

  toolbar.appendChild(saveBtn);

  const shareBtn=document.createElement('button');shareBtn.className='draw-tool-btn';shareBtn.textContent='share';
  shareBtn.title='Share canvas with peer';
  shareBtn.onclick=()=>{if(!peerConnected||!peerConn){print('peer: not connected. Use: peer connect <id>','t-warn');return;}const dataUrl=canvas.toDataURL('image/jpeg',0.7);peerConn.send(JSON.stringify({type:'canvas',data:dataUrl,from:'draw#'+id}));print('peer: canvas shared to '+peerConn.peer,'t-peer');};
  toolbar.appendChild(shareBtn);

  const canvasWrap=document.createElement('div');canvasWrap.className='draw-canvas-wrap';
  const canvas=document.createElement('canvas');canvas.className='draw-canvas';
  canvas.width=W;canvas.height=H;canvas.style.cssText='display:block;width:100%;height:100%;cursor:crosshair;touch-action:none;';
  const coords=document.createElement('div');coords.className='draw-coords';coords.textContent='0, 0';
  canvasWrap.appendChild(canvas);canvasWrap.appendChild(coords);
  body.appendChild(toolbar);body.appendChild(canvasWrap);

  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#050505';ctx.fillRect(0,0,W,H);

  if(widgets[id])widgets[id]._drawCanvas=canvas;

  function getPos(e){
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width;const scaleY=canvas.height/rect.height;
    const src=e.touches?e.touches[0]:e;
    return{x:Math.round((src.clientX-rect.left)*scaleX),y:Math.round((src.clientY-rect.top)*scaleY)};
  }

  function floodFill(cx,cy,fillColorHex){
    const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);const data=imageData.data;
    const idx=(cx+cy*canvas.width)*4;
    const sr=data[idx];const sg=data[idx+1];const sb=data[idx+2];const sa=data[idx+3];
    const fr=parseInt(fillColorHex.slice(1,3),16);const fg=parseInt(fillColorHex.slice(3,5),16);const fb=parseInt(fillColorHex.slice(5,7),16);
    if(sr===fr&&sg===fg&&sb===fb)return;
    const stack=[[cx,cy]];
    while(stack.length){
      const [px,py]=stack.pop();const pi=(px+py*canvas.width)*4;
      if(px<0||py<0||px>=canvas.width||py>=canvas.height)continue;
      if(data[pi]!==sr||data[pi+1]!==sg||data[pi+2]!==sb||data[pi+3]!==sa)continue;
      data[pi]=fr;data[pi+1]=fg;data[pi+2]=fb;data[pi+3]=255;
      stack.push([px+1,py],[px-1,py],[px,py+1],[px,py-1]);
    }
    ctx.putImageData(imageData,0,0);
  }

  function drawShape(x,y){
    ctx.putImageData(snapshotData,0,0);
    ctx.strokeStyle=drawColor;ctx.fillStyle=drawColor;ctx.lineWidth=lineWidth;ctx.lineCap='round';ctx.lineJoin='round';
    if(activeTool==='line'){ctx.beginPath();ctx.moveTo(startX,startY);ctx.lineTo(x,y);ctx.stroke();}
    else if(activeTool==='rect'){ctx.beginPath();ctx.rect(startX,startY,x-startX,y-startY);ctx.stroke();}
    else if(activeTool==='circle'){const rx=Math.abs(x-startX)/2;const ry=Math.abs(y-startY)/2;const cx2=Math.min(startX,x)+rx;const cy2=Math.min(startY,y)+ry;ctx.beginPath();ctx.ellipse(cx2,cy2,rx,ry,0,0,Math.PI*2);ctx.stroke();}
  }

  canvas.addEventListener('mousedown',e=>{
    const{x,y}=getPos(e);startX=x;startY=y;isDrawing=true;
    if(activeTool==='fill'){floodFill(x,y,drawColor);return;}
    undoStack.push(ctx.getImageData(0,0,canvas.width,canvas.height));if(undoStack.length>30)undoStack.shift();
    snapshotData=ctx.getImageData(0,0,canvas.width,canvas.height);
    if(activeTool==='pen'||activeTool==='erase'){
      ctx.beginPath();ctx.moveTo(x,y);
      ctx.strokeStyle=activeTool==='erase'?'#050505':drawColor;
      ctx.lineWidth=activeTool==='erase'?lineWidth*3:lineWidth;ctx.lineCap='round';ctx.lineJoin='round';
    }
  });

  canvas.addEventListener('mousemove',e=>{
    const{x,y}=getPos(e);coords.textContent=x+', '+y;
    if(!isDrawing)return;
    if(activeTool==='pen'||activeTool==='erase'){
      ctx.lineTo(x,y);ctx.stroke();ctx.beginPath();ctx.moveTo(x,y);
    } else if(['line','rect','circle'].includes(activeTool)){drawShape(x,y);}
  });

  function stopDraw(e){
    if(!isDrawing)return;isDrawing=false;
    if(e&&['line','rect','circle'].includes(activeTool)){const{x,y}=getPos(e);drawShape(x,y);}
    ctx.beginPath();
  }

  canvas.addEventListener('mouseup',stopDraw);
  canvas.addEventListener('mouseleave',stopDraw);
  canvas.addEventListener('touchstart',e=>{e.preventDefault();const{x,y}=getPos(e);startX=x;startY=y;isDrawing=true;if(activeTool==='fill'){floodFill(x,y,drawColor);return;}undoStack.push(ctx.getImageData(0,0,canvas.width,canvas.height));if(undoStack.length>30)undoStack.shift();snapshotData=ctx.getImageData(0,0,canvas.width,canvas.height);if(activeTool==='pen'||activeTool==='erase'){ctx.beginPath();ctx.moveTo(x,y);ctx.strokeStyle=activeTool==='erase'?'#050505':drawColor;ctx.lineWidth=activeTool==='erase'?lineWidth*3:lineWidth;ctx.lineCap='round';ctx.lineJoin='round';}},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();const{x,y}=getPos(e);coords.textContent=x+', '+y;if(!isDrawing)return;if(activeTool==='pen'||activeTool==='erase'){ctx.lineTo(x,y);ctx.stroke();ctx.beginPath();ctx.moveTo(x,y);}else if(['line','rect','circle'].includes(activeTool)){drawShape(x,y);}},{passive:false});
  canvas.addEventListener('touchend',e=>{if(!isDrawing)return;isDrawing=false;if(activeTool!=='pen'&&activeTool!=='erase'){const{x,y}=getPos(e.changedTouches?{...e,touches:e.changedTouches}:e);drawShape(x,y);}ctx.beginPath();});

  return{output:'[widget:'+id+'] draw canvas '+W+'x'+H};
}

const WEBGL_SCENES={
  particles:{vert:`attribute vec2 a_pos;uniform float u_time;uniform vec2 u_res;varying float v_life;void main(){float t=u_time*0.3;vec2 p=a_pos;p.x+=sin(p.y*3.0+t*1.3)*0.15;p.y+=cos(p.x*2.5+t*0.9)*0.12;p.x+=cos(t*0.4+a_pos.x*5.0)*0.08;p.y+=sin(t*0.6+a_pos.y*4.0)*0.06;v_life=0.5+0.5*sin(t+a_pos.x*10.0);gl_Position=vec4(p,0,1);gl_PointSize=2.5+v_life*2.0;}`,frag:`precision mediump float;varying float v_life;void main(){float d=length(gl_PointCoord-0.5)*2.0;if(d>1.0)discard;float a=(1.0-d)*v_life;gl_FragColor=vec4(0.0,0.5+v_life*0.5,0.0,a*0.8);}`},
  plasma:{vert:`attribute vec2 a_pos;varying vec2 v_uv;void main(){v_uv=a_pos*0.5+0.5;gl_Position=vec4(a_pos,0,1);}`,frag:`precision mediump float;uniform float u_time;varying vec2 v_uv;void main(){float x=v_uv.x*6.28;float y=v_uv.y*6.28;float v=sin(x+u_time)+sin(y+u_time*1.3)+sin((x+y)+u_time*0.7)+sin(sqrt(x*x+y*y)*2.0+u_time*0.9);v=(v+4.0)/8.0;float r=0.0;float g=v*0.8+0.2*sin(u_time+v*3.14);float b=0.0;gl_FragColor=vec4(r,g,b,1.0);}`},
  tunnel:{vert:`attribute vec2 a_pos;varying vec2 v_uv;void main(){v_uv=a_pos;gl_Position=vec4(a_pos,0,1);}`,frag:`precision mediump float;uniform float u_time;varying vec2 v_uv;void main(){vec2 p=v_uv;float r=length(p);float a=atan(p.y,p.x);float tunnel=fract(1.0/(r+0.001)+u_time*0.4);float bands=step(0.5,fract(a/6.28+u_time*0.1));float brightness=tunnel*bands;gl_FragColor=vec4(0.0,brightness,0.0,1.0);}`},
  fractal:{vert:`attribute vec2 a_pos;varying vec2 v_uv;void main(){v_uv=a_pos;gl_Position=vec4(a_pos,0,1);}`,frag:`precision mediump float;uniform float u_time;uniform vec2 u_res;varying vec2 v_uv;void main(){vec2 c=v_uv*1.5+vec2(-0.5,0.0);c.x+=sin(u_time*0.15)*0.3;c.y+=cos(u_time*0.12)*0.2;vec2 z=c;float i=0.0;for(int j=0;j<64;j++){if(dot(z,z)>4.0)break;z=vec2(z.x*z.x-z.y*z.y,2.0*z.x*z.y)+c;i+=1.0;}float t=i/64.0;gl_FragColor=vec4(0.0,t*0.9+0.1*sin(t*20.0+u_time),0.0,1.0);}`},
  waves:{vert:`attribute vec2 a_pos;varying vec2 v_uv;void main(){v_uv=a_pos*0.5+0.5;gl_Position=vec4(a_pos,0,1);}`,frag:`precision mediump float;uniform float u_time;varying vec2 v_uv;void main(){float w=0.0;for(float i=1.0;i<=5.0;i++){w+=sin(v_uv.x*i*3.0+u_time*(1.0+i*0.2))*cos(v_uv.y*i*2.5-u_time*0.8)/i;}float y=v_uv.y-0.5;float bright=exp(-abs(y-w*0.15)*15.0);gl_FragColor=vec4(0.0,bright*0.9,bright*0.3,1.0);}`},
  matrix:{vert:`attribute vec2 a_pos;varying vec2 v_uv;void main(){v_uv=a_pos*0.5+0.5;gl_Position=vec4(a_pos,0,1);}`,frag:`precision mediump float;uniform float u_time;varying vec2 v_uv;float rand(vec2 co){return fract(sin(dot(co,vec2(12.9898,78.233)))*43758.5453);}void main(){vec2 col=floor(v_uv*vec2(40.0,25.0));float speed=rand(col.xx)*2.0+0.5;float offset=rand(col.yy)*10.0;float head=fract(col.y/25.0-u_time*speed*0.3+offset);float trail=exp(-head*5.0);float chr=step(0.5,rand(col+floor(u_time*speed*8.0)));float bright=trail*chr;gl_FragColor=vec4(0.0,bright,bright*0.3,1.0);}`}
};

function setupWebGL(body,id,sceneName){
  const wrap=document.createElement('div');wrap.className='webgl-wrap';
  const canvas=document.createElement('canvas');canvas.className='webgl-canvas';
  const fpsEl=document.createElement('div');fpsEl.className='webgl-fps';fpsEl.textContent='-- fps';
  wrap.appendChild(canvas);wrap.appendChild(fpsEl);body.appendChild(wrap);

  const toggleBtn=document.createElement('button');toggleBtn.className='webgl-toggle';toggleBtn.textContent='⚙';body.appendChild(toggleBtn);
  const ctrlPanel=document.createElement('div');ctrlPanel.className='webgl-controls';ctrlPanel.style.display='none';
  const sceneRow=document.createElement('div');sceneRow.className='webgl-ctrl-row';
  const sceneLbl=document.createElement('label');sceneLbl.textContent='scene:';sceneLbl.style.color='#555';
  const sceneSel=document.createElement('select');sceneSel.className='webgl-ctrl-sel';
  Object.keys(WEBGL_SCENES).forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;if(s===sceneName)o.selected=true;sceneSel.appendChild(o);});
  sceneRow.appendChild(sceneLbl);sceneRow.appendChild(sceneSel);ctrlPanel.appendChild(sceneRow);body.appendChild(ctrlPanel);
  toggleBtn.onclick=e=>{e.stopPropagation();ctrlPanel.style.display=ctrlPanel.style.display==='none'?'flex':'none';ctrlPanel.style.flexDirection='column';};

  let gl=null;let prog=null;let rafId=null;let posLoc=0;let timeLoc=null;let resLoc=null;let vbo=null;let startTime=Date.now();let frameCount=0;let lastFpsTime=Date.now();let currentScene=sceneName;

  function initGL(scene){
    if(prog){gl.deleteProgram(prog);prog=null;}if(vbo){gl.deleteBuffer(vbo);vbo=null;}
    if(!gl){
      try{gl=canvas.getContext('webgl')||canvas.getContext('experimental-webgl');}catch(e){gl=null;}
      if(!gl){wrap.innerHTML='<div style="color:#444;padding:16px;font-size:11px">WebGL not available</div>';return false;}
    }
    const sd=WEBGL_SCENES[scene]||WEBGL_SCENES.particles;
    function mkShader(type,src){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return gl.getShaderParameter(s,gl.COMPILE_STATUS)?s:(console.warn(gl.getShaderInfoLog(s)),null);}
    const vs=mkShader(gl.VERTEX_SHADER,sd.vert);const fs=mkShader(gl.FRAGMENT_SHADER,sd.frag);
    if(!vs||!fs)return false;
    prog=gl.createProgram();gl.attachShader(prog,vs);gl.attachShader(prog,fs);gl.linkProgram(prog);
    if(!gl.getProgramParameter(prog,gl.LINK_STATUS))return false;
    posLoc=gl.getAttribLocation(prog,'a_pos');timeLoc=gl.getUniformLocation(prog,'u_time');resLoc=gl.getUniformLocation(prog,'u_res');
    if(scene==='particles'){
      const pts=[];for(let i=0;i<2000;i++){pts.push((Math.random()*2-1),(Math.random()*2-1));}
      vbo=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,vbo);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(pts),gl.STATIC_DRAW);
    } else {
      const quad=new Float32Array([-1,-1,1,-1,-1,1,1,1]);
      vbo=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,vbo);gl.bufferData(gl.ARRAY_BUFFER,quad,gl.STATIC_DRAW);
    }
    startTime=Date.now();return true;
  }

  function resize(){
    const r=wrap.getBoundingClientRect();
    canvas.width=Math.round(r.width);canvas.height=Math.round(r.height);
    if(gl)gl.viewport(0,0,canvas.width,canvas.height);
  }

  const ro=new ResizeObserver(resize);ro.observe(wrap);resize();

  function render(){
    if(!canvas.isConnected){cancelAnimationFrame(rafId);ro.disconnect();return;}
    resize();
    if(!gl||!prog){rafId=requestAnimationFrame(render);return;}
    const t=(Date.now()-startTime)/1000;
    gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);
    gl.useProgram(prog);gl.bindBuffer(gl.ARRAY_BUFFER,vbo);
    gl.enableVertexAttribArray(posLoc);gl.vertexAttribPointer(posLoc,2,gl.FLOAT,false,0,0);
    if(timeLoc)gl.uniform1f(timeLoc,t);if(resLoc)gl.uniform2f(resLoc,canvas.width,canvas.height);
    if(currentScene==='particles'){gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE);gl.drawArrays(gl.POINTS,0,1000);gl.disable(gl.BLEND);}
    else{gl.drawArrays(gl.TRIANGLE_STRIP,0,4);}
    frameCount++;
    const now=Date.now();if(now-lastFpsTime>=1000){fpsEl.textContent=frameCount+' fps';frameCount=0;lastFpsTime=now;}
    rafId=requestAnimationFrame(render);
  }

  sceneSel.onchange=()=>{currentScene=sceneSel.value;initGL(currentScene);};

  if(initGL(currentScene))render();
  if(widgets[id])widgets[id].cleanup=()=>{cancelAnimationFrame(rafId);ro.disconnect();if(prog&&gl)gl.deleteProgram(prog);};
}

function doPeer(args){
  if(!args.length){
    buildPeerPanel();
    return{output:peerMyId?'Peer ID: '+peerMyId:'Opening peer panel...'};
  }
  const sub=args[0];
  if(sub==='connect'){
    const peerId=args[1];if(!peerId)return{err:'peer connect: missing peer ID'};
    if(!peerInstance)return{err:'peer: not initialized. Run: peer'};
    connectToPeer(peerId);return{output:'Connecting to '+peerId+'...'};
  }
  if(sub==='send'){
    if(!peerConnected||!peerConn)return{err:'peer: not connected'};
    const msg=args.slice(1).join(' ');if(!msg)return{err:'peer send: missing message'};
    peerConn.send(JSON.stringify({type:'chat',text:msg}));
    return{output:'→ '+msg};
  }
  if(sub==='share'){
    const wid=parseInt(args[1]);if(!wid||!widgets[wid])return{err:'peer share: invalid widget ID'};
    if(!peerConnected||!peerConn)return{err:'peer: not connected'};
    const w=widgets[wid];
    const cvs=w._drawCanvas||w.el.querySelector('canvas');
    if(!cvs)return{err:'peer share: widget has no canvas'};
    try{const dataUrl=cvs.toDataURL('image/jpeg',0.7);peerConn.send(JSON.stringify({type:'canvas',data:dataUrl,from:'widget#'+wid}));return{output:'Shared widget #'+wid+' canvas to '+peerConn.peer};}
    catch(e){return{err:'peer share: '+e.message};}
  }
  if(sub==='close'){
    if(peerConn){peerConn.close();peerConn=null;}
    peerConnected=false;updatePeerStatus(false);
    return{output:'Peer disconnected'};
  }
  if(sub==='id'){
    return{output:peerMyId?'Your peer ID: '+peerMyId:'Peer not initialized. Run: peer'};
  }
  return{err:'peer: unknown subcommand. Usage: peer [connect|send|share|close|id]'};
}

function initPeer(onReady){
  if(peerInstance&&peerMyId){if(onReady)onReady(peerMyId);return;}
  try{
    peerInstance=new Peer({config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]}});
    peerInstance.on('open',id=>{
      peerMyId=id;updatePeerStatus(false);
      print('peer: ready. Your ID: '+id,'t-peer');
      if(onReady)onReady(id);
    });
    peerInstance.on('connection',conn=>{
      peerConn=conn;setupConn(conn);
    });
    peerInstance.on('error',e=>{print('peer: error: '+e.type,'t-warn');});
  }catch(e){print('peer: PeerJS not loaded: '+e.message,'t-warn');}
}

function connectToPeer(peerId){
  if(!peerInstance){print('peer: initializing...','t-peer');initPeer(()=>connectToPeer(peerId));return;}
  const conn=peerInstance.connect(peerId,{reliable:true,serialization:'raw'});
  setupConn(conn);
  print('peer: connecting to '+peerId,'t-peer');
}

function setupConn(conn){
  peerConn=conn;
  conn.on('open',()=>{
    peerConnected=true;updatePeerStatus(true);
    print('peer: connected to '+conn.peer,'t-peer');
    updatePeerPanels();
  });
  conn.on('data',data=>{
    let msg;
    try{msg=JSON.parse(typeof data==='string'?data:new TextDecoder().decode(data));}
    catch(e){print('['+conn.peer.slice(0,8)+'...]: '+(typeof data==='string'?data:String(data)),'t-peer');return;}
    if(msg.type==='chat'){print('['+conn.peer.slice(0,8)+']: '+msg.text,'t-peer');}
    else if(msg.type==='canvas'){
      const id=createWidget('image','shared canvas from '+conn.peer.slice(0,8),400,320,'shared canvas');
      const body=widgets[id].body;const wrap=document.createElement('div');wrap.className='img-wrap';
      const img=document.createElement('img');img.src=msg.data;img.style.cssText='max-width:100%;max-height:100%;object-fit:contain;';
      wrap.appendChild(img);body.appendChild(wrap);print('peer: canvas received from '+conn.peer,'t-peer');
    }
    updatePeerPanels();
  });
  conn.on('close',()=>{peerConnected=false;updatePeerStatus(false);print('peer: disconnected from '+conn.peer,'t-peer');updatePeerPanels();});
  conn.on('error',e=>{print('peer: conn error: '+e.message,'t-warn');});
}

function updatePeerStatus(connected){
  peerConnected=connected;
  if(connected){peerStatusEl.textContent='● '+peerConn.peer.slice(0,12)+'...';peerStatusEl.classList.add('connected');tbPeerBtn.classList.add('peer-active');}
  else{peerStatusEl.textContent=peerMyId?'● ready':'● offline';peerStatusEl.classList.remove('connected');tbPeerBtn.classList.remove('peer-active');}
}

function updatePeerPanels(){
  document.querySelectorAll('[data-peer-panel]').forEach(el=>{
    const wid=parseInt(el.dataset.peerPanel);if(widgets[wid])refreshPeerPanel(el,wid);
  });
}

function buildPeerPanel(){
  const id=createWidget('peer','peer panel',360,480,'PeerJS Panel');
  const body=widgets[id].body;body.dataset.peerPanel=id;
  refreshPeerPanel(body,id);
  initPeer(()=>refreshPeerPanel(body,id));
}

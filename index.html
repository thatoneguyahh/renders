function doShow(){
  const ids=Object.keys(widgets);if(!ids.length)return{output:'No widgets open.'};
  const lines=['Open widgets:'];
  for(const id of ids){
    const w=widgets[id];const el=w.el;const status=w.minimized?'[min]':(w.prevRect?'[max]':'');
    lines.push('  ['+id+'] '+w.type.padEnd(10)+' '+Math.round(parseInt(el.style.left)||0)+'x'+Math.round(parseInt(el.style.top)||0)+'  '+Math.round(parseInt(el.style.width)||0)+'x'+Math.round(parseInt(el.style.height)||0)+'  '+status);
  }
  return{output:lines.join('\n')};
}

function doResize(args){
  if(args.length<3)return{err:'resize: usage: resize <id> <width> <height>'};
  const id=parseInt(args[0]);const w=parseInt(args[1]);const h=parseInt(args[2]);
  if(!widgets[id])return{err:'resize: no widget '+id};
  widgets[id].el.style.width=w+'px';widgets[id].el.style.height=h+'px';
  return{output:'[widget:'+id+'] resized to '+w+'x'+h};
}

function doFocus(args){
  const target=args[0];if(!target||target==='terminal'){focusTerminal();return{output:'Focus: terminal'};}
  const id=parseInt(target);if(widgets[id]){focusWidget(id);return{output:'Focus: widget '+id};}
  return{err:'focus: no widget '+target};
}

function doTile(){
  const ids=Object.keys(widgets).map(Number);if(!ids.length)return{output:'No widgets to tile.'};
  const area=widgetArea.getBoundingClientRect();const n=ids.length;
  const cols=Math.ceil(Math.sqrt(n));const rows=Math.ceil(n/cols);
  const w=Math.floor(area.width/cols);const h=Math.floor(area.height/rows);
  ids.forEach((id,i)=>{const col=i%cols;const row=Math.floor(i/cols);const el=widgets[id].el;el.style.left=(col*w)+'px';el.style.top=(row*h)+'px';el.style.width=w+'px';el.style.height=h+'px';if(widgets[id].minimized)restoreWidget(id);if(widgets[id].prevRect)widgets[id].prevRect=null;});
  return{output:'Tiled '+n+' widgets'};
}

function doCascade(){
  const ids=Object.keys(widgets).map(Number);if(!ids.length)return{output:'No widgets to cascade.'};
  const area=widgetArea.getBoundingClientRect();const w=Math.min(600,area.width*0.7);const h=Math.min(450,area.height*0.7);
  ids.forEach((id,i)=>{const offset=i*28;const el=widgets[id].el;el.style.left=Math.min(offset,area.width-w-10)+'px';el.style.top=Math.min(offset,area.height-h-10)+'px';el.style.width=w+'px';el.style.height=h+'px';if(widgets[id].minimized)restoreWidget(id);if(widgets[id].prevRect)widgets[id].prevRect=null;focusWidget(id);});
  return{output:'Cascaded '+ids.length+' widgets'};
}

function doRenders(args){
  const sub=args[0];if(!sub)return{err:'renders: subcommands: ps, kill, minimize, maximize, save, load, config'};
  if(sub==='ps')return doShow();
  if(sub==='kill')return doKill(args.slice(1));
  if(sub==='minimize'){const id=parseInt(args[1]);if(!widgets[id])return{err:'renders: no widget '+args[1]};minimizeWidget(id);return{output:'[widget:'+id+'] minimized'};}
  if(sub==='maximize'){const id=parseInt(args[1]);if(!widgets[id])return{err:'renders: no widget '+args[1]};maximizeWidget(id);return{output:'[widget:'+id+'] '+(widgets[id].prevRect?'restored':'maximized')};}
  if(sub==='save'){
    const name=args[1];if(!name)return{err:'renders save: missing workspace name'};
    const layout=Object.entries(widgets).map(([id,w])=>{const el=w.el;return{id,title:w.title,type:w.type,x:parseInt(el.style.left)||0,y:parseInt(el.style.top)||0,w:parseInt(el.style.width)||400,h:parseInt(el.style.height)||300};});
    try{localStorage.setItem('renders_ws_'+name,JSON.stringify(layout));}catch(e){return{err:'renders save: storage error: '+e.message};}
    return{output:'Workspace \''+name+'\' saved ('+layout.length+' widgets)'};
  }
  if(sub==='load'){
    const name=args[1];if(!name)return{err:'renders load: missing workspace name'};
    let data;try{data=JSON.parse(localStorage.getItem('renders_ws_'+name)||'null');}catch(e){return{err:'renders load: parse error'};}
    if(!data)return{err:'renders load: workspace \''+name+'\' not found'};
    return{output:'Workspace \''+name+'\' info: '+data.length+' widgets'};
  }
  if(sub==='config'){
    if(args[1]==='set'){
      const key=args[2];const val=args[3];if(!key||val===undefined)return{err:'renders config set: usage: renders config set <key> <value>'};
      if(key in config){const v=isNaN(val)?val:Number(val);config[key]=v;try{localStorage.setItem('renders_config',JSON.stringify(config));}catch(e){}if(key==='font_size')document.documentElement.style.setProperty('--fs',v+'px');return{output:'config.'+key+' = '+v};}
      return{err:'renders config: unknown key \''+key+'\'. Valid: '+Object.keys(config).join(', ')};
    }
    return{output:'Configuration:\n'+Object.entries(config).map(([k,v])=>'  '+k+' = '+JSON.stringify(v)).join('\n')};
  }
  return{err:'renders: unknown subcommand \''+sub+'\''};
}

function createWidget(type,title,w,h,fullTitle){
  const id=widgetIdCounter++;
  const area=widgetArea.getBoundingClientRect();
  const isMobile=window.matchMedia('(max-width:768px),(pointer:coarse)').matches;
  let x,y,fw,fh;
  if(isMobile){fw=Math.min(area.width-16,Math.max(300,area.width-16));fh=Math.min(area.height-40,Math.max(260,h));x=8;y=8+(Object.keys(widgets).length*8)%40;}
  else{const ec=Object.keys(widgets).length;const offset=(ec%10)*22;fw=Math.min(w,area.width-40);fh=Math.min(h,area.height-40);x=Math.max(10,Math.min(area.width-fw-20,20+offset));y=Math.max(10,Math.min(area.height-fh-20,20+offset));}
  const el=document.createElement('div');el.className='widget';el.style.cssText=`left:${x}px;top:${y}px;width:${fw}px;height:${fh}px;`;
  const titlebar=document.createElement('div');titlebar.className='widget-titlebar';
  const btnWrap=document.createElement('div');btnWrap.className='wt-btns';
  const closeBtn=document.createElement('button');closeBtn.className='wt-btn close';closeBtn.title='Close';
  const minBtn=document.createElement('button');minBtn.className='wt-btn min';minBtn.title='Minimize/Restore';
  const maxBtn=document.createElement('button');maxBtn.className='wt-btn max';maxBtn.title='Maximize/Restore';
  btnWrap.appendChild(closeBtn);btnWrap.appendChild(minBtn);btnWrap.appendChild(maxBtn);
  const titleSpan=document.createElement('span');titleSpan.className='wt-title';titleSpan.textContent=fullTitle||title;titleSpan.title=fullTitle||title;
  const idSpan=document.createElement('span');idSpan.className='wt-id';idSpan.textContent='#'+id;
  titlebar.appendChild(btnWrap);titlebar.appendChild(titleSpan);titlebar.appendChild(idSpan);
  const body=document.createElement('div');body.className='widget-body';
  const resizeHandle=document.createElement('div');resizeHandle.className='widget-resize';
  el.appendChild(titlebar);el.appendChild(body);el.appendChild(resizeHandle);
  widgetArea.appendChild(el);
  const wObj={id,type,title:fullTitle||title,el,body,titlebar,minimized:false,cleanup:null,prevRect:null};
  widgets[id]=wObj;
  closeBtn.addEventListener('click',e=>{e.stopPropagation();closeWidget(id);});
  minBtn.addEventListener('click',e=>{e.stopPropagation();if(wObj.minimized)restoreWidget(id);else minimizeWidget(id);});
  maxBtn.addEventListener('click',e=>{e.stopPropagation();maximizeWidget(id);});
  titlebar.addEventListener('dblclick',e=>{if(!e.target.classList.contains('wt-btn'))maximizeWidget(id);});
  makeDraggable(el,titlebar);makeResizable(el,resizeHandle);
  el.addEventListener('mousedown',()=>focusWidget(id));
  el.addEventListener('touchstart',()=>focusWidget(id),{passive:true});
  widgetArea.style.pointerEvents='all';focusWidget(id);
  return id;
}

function closeWidget(id){
  const w=widgets[id];if(!w)return;
  if(w.cleanup){try{w.cleanup();}catch(e){}}
  w.el.remove();delete widgets[id];
  if(lastFocusedWidget===id)lastFocusedWidget=null;
  const rem=Object.keys(widgets);
  if(rem.length>0)focusWidget(parseInt(rem[rem.length-1]));
  else{widgetArea.style.pointerEvents='none';focusTerminal();}
}

function minimizeWidget(id){const w=widgets[id];if(!w)return;w.el.classList.add('minimized');w.minimized=true;}
function restoreWidget(id){const w=widgets[id];if(!w)return;w.el.classList.remove('minimized');w.minimized=false;}

function maximizeWidget(id){
  const w=widgets[id];if(!w)return;const el=w.el;
  if(w.prevRect){el.style.left=w.prevRect.left+'px';el.style.top=w.prevRect.top+'px';el.style.width=w.prevRect.width+'px';el.style.height=w.prevRect.height+'px';el.classList.remove('fullscreen');w.prevRect=null;}
  else{w.prevRect={left:parseInt(el.style.left)||0,top:parseInt(el.style.top)||0,width:parseInt(el.style.width)||400,height:parseInt(el.style.height)||300};el.style.left='0px';el.style.top='0px';el.style.width=widgetArea.offsetWidth+'px';el.style.height=widgetArea.offsetHeight+'px';el.classList.add('fullscreen');}
}

function focusWidget(id){
  if(!widgets[id])return;termFocused=false;lastFocusedWidget=id;
  Object.values(widgets).forEach(w=>w.el.classList.remove('focused'));
  widgets[id].el.classList.add('focused');widgets[id].el.style.zIndex=String(300+(widgetIdCounter));
}

function focusTerminal(){
  termFocused=true;Object.values(widgets).forEach(w=>w.el.classList.remove('focused'));
  const isMobile=window.matchMedia('(max-width:768px),(pointer:coarse)').matches;
  if(isMobile)mobileField.focus();else inputField.focus();
}

function makeDraggable(el,handle){
  let dragging=false;let ox=0;let oy=0;
  function onStart(cx,cy){dragging=true;ox=cx-el.offsetLeft;oy=cy-el.offsetTop;el.style.transition='none';el.style.userSelect='none';}
  function onMove(cx,cy){if(!dragging)return;const aW=widgetArea.offsetWidth;const aH=widgetArea.offsetHeight;el.style.left=Math.max(0,Math.min(aW-40,cx-ox))+'px';el.style.top=Math.max(0,Math.min(aH-30,cy-oy))+'px';}
  function onEnd(){dragging=false;el.style.userSelect='';}
  handle.addEventListener('mousedown',e=>{if(e.target.classList.contains('wt-btn'))return;e.preventDefault();onStart(e.clientX,e.clientY);});
  document.addEventListener('mousemove',e=>{onMove(e.clientX,e.clientY);});
  document.addEventListener('mouseup',onEnd);
  let touchId=null;
  handle.addEventListener('touchstart',e=>{if(e.target.classList.contains('wt-btn'))return;const t=e.changedTouches[0];touchId=t.identifier;onStart(t.clientX,t.clientY);},{passive:true});
  handle.addEventListener('touchmove',e=>{const t=[...e.changedTouches].find(t=>t.identifier===touchId);if(t)onMove(t.clientX,t.clientY);e.preventDefault();},{passive:false});
  handle.addEventListener('touchend',e=>{const t=[...e.changedTouches].find(t=>t.identifier===touchId);if(t){onEnd();touchId=null;}});
}

function makeResizable(el,handle){
  let resizing=false;let sx=0;let sy=0;let sw=0;let sh=0;
  function onStart(cx,cy){resizing=true;sx=cx;sy=cy;sw=el.offsetWidth;sh=el.offsetHeight;}
  function onMove(cx,cy){if(!resizing)return;el.style.width=Math.max(200,sw+(cx-sx))+'px';el.style.height=Math.max(100,sh+(cy-sy))+'px';}
  function onEnd(){resizing=false;}
  handle.addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();onStart(e.clientX,e.clientY);});
  document.addEventListener('mousemove',e=>{onMove(e.clientX,e.clientY);});
  document.addEventListener('mouseup',onEnd);
  let touchId=null;
  handle.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();const t=e.changedTouches[0];touchId=t.identifier;onStart(t.clientX,t.clientY);},{passive:false});
  document.addEventListener('touchmove',e=>{if(!resizing)return;const t=[...e.changedTouches].find(t=>t.identifier===touchId);if(t){onMove(t.clientX,t.clientY);e.preventDefault();}},{passive:false});
  document.addEventListener('touchend',e=>{if(resizing){const t=[...e.changedTouches].find(t=>t.identifier===touchId);if(t){onEnd();touchId=null;}}});
}

function getTabCompletions(partial){
  const completions=[];
  if(!partial.includes(' ')){for(const cmd of CMDS)if(cmd.startsWith(partial))completions.push(cmd);return completions;}
  const parts=partial.split(' ');const pathPart=parts[parts.length-1];let dirPath=cwd;let prefix='';
  const lastSlash=pathPart.lastIndexOf('/');
  if(lastSlash>=0){dirPath=resolvePath(pathPart.slice(0,lastSlash)||'/');prefix=pathPart.slice(0,lastSlash+1);}
  const base=pathPart.slice(lastSlash+1);
  if(fsIsDir(dirPath)){const children=fsListDir(dirPath)||[];for(const c of children){if(c.startsWith(base)){const fp=dirPath==='/'?'/'+c:dirPath+'/'+c;completions.push(parts.slice(0,-1).join(' ')+' '+prefix+c+(fsIsDir(fp)?'/':''));}}}
  for(const k of Object.keys(importedFiles)){const base2=k.substring(k.lastIndexOf('/')+1);if(base2.startsWith(base))completions.push(parts.slice(0,-1).join(' ')+' '+base2);}
  return completions;
}

function handleInputKey(e,field){
  if(e.key==='Enter'){
    e.preventDefault();const val=field.value.trim();field.value='';
    if(val){printPrompt(val);executeCommand(val);}
  } else if(e.key==='ArrowUp'){
    e.preventDefault();if(histIdx<cmdHistory.length-1){histIdx++;field.value=cmdHistory[histIdx]||'';}
    requestAnimationFrame(()=>field.setSelectionRange(field.value.length,field.value.length));
  } else if(e.key==='ArrowDown'){
    e.preventDefault();if(histIdx>0){histIdx--;field.value=cmdHistory[histIdx]||'';}else{histIdx=-1;field.value='';}
    requestAnimationFrame(()=>field.setSelectionRange(field.value.length,field.value.length));
  } else if(e.key==='Tab'){
    e.preventDefault();const val=field.value;const completions=getTabCompletions(val);
    if(completions.length===1){field.value=completions[0]+(completions[0].endsWith('/')?'':' ');}
    else if(completions.length>1){print(completions.join('  '));const common=completions.reduce((a,b)=>{let i=0;while(i<a.length&&a[i]===b[i])i++;return a.slice(0,i);});if(common.length>val.length)field.value=common;}
  } else if(e.key==='c'&&e.ctrlKey){
    e.preventDefault();if(field.value){print('$ '+field.value+'^C');field.value='';}else print('^C');
  } else if(e.key==='l'&&e.ctrlKey){e.preventDefault();doClear();}
  else if(e.key==='u'&&e.ctrlKey){e.preventDefault();field.value='';}
  else if(e.key==='a'&&e.ctrlKey){e.preventDefault();field.setSelectionRange(0,0);}
  else if(e.key==='e'&&e.ctrlKey){e.preventDefault();field.setSelectionRange(field.value.length,field.value.length);}
  else if(e.key==='Escape'){focusTerminal();}
}

inputField.addEventListener('keydown',e=>handleInputKey(e,inputField));
mobileField.addEventListener('keydown',e=>handleInputKey(e,mobileField));

document.getElementById('mobile-send').addEventListener('click',()=>{
  const val=mobileField.value.trim();mobileField.value='';
  if(val){printPrompt(val);executeCommand(val);}mobileField.focus();
});

document.getElementById('mobile-shortcuts').addEventListener('click',e=>{
  const btn=e.target.closest('.mob-key');if(!btn)return;
  if(btn.dataset.key){mobileField.dispatchEvent(new KeyboardEvent('keydown',{key:btn.dataset.key,bubbles:true}));}
  else if(btn.dataset.ins){mobileField.value+=btn.dataset.ins;mobileField.focus();}
  else if(btn.dataset.ctrl){mobileField.dispatchEvent(new KeyboardEvent('keydown',{key:btn.dataset.ctrl,ctrlKey:true,bubbles:true}));}
});

document.addEventListener('keydown',e=>{
  if(e.code==='Space'&&e.ctrlKey){e.preventDefault();if(termFocused&&lastFocusedWidget&&widgets[lastFocusedWidget])focusWidget(lastFocusedWidget);else focusTerminal();}
});

terminal.addEventListener('click',()=>{if(termFocused)inputField.focus();});
document.addEventListener('click',e=>{if(!e.target.closest('.widget')&&!e.target.closest('#toolbar')&&!e.target.closest('#mobile-input-bar'))focusTerminal();});

document.getElementById('tb-open').addEventListener('click',()=>{fileInput.click();});
document.getElementById('tb-widget-toggle').addEventListener('click',()=>{const ids=Object.keys(widgets);if(ids.length){doCascade();}else termCmd('show');});

fileInput.addEventListener('change',()=>{
  const files=fileInput.files;if(!files||!files.length)return;
  for(const file of files){
    const url=URL.createObjectURL(file);const fsPath=registerImportedFile(file,url);
    const name=file.name.toLowerCase();print('Imported: '+file.name+' -> '+fsPath,'t-dim');
    let cmd=null;
    if(/\.(mp4|webm|ogg|mov|avi|mkv)$/.test(name))cmd='video';
    else if(/\.(mp3|wav|ogg|flac|aac|m4a|opus)$/.test(name))cmd='audio';
    else if(/\.(jpg|jpeg|png|gif|webp|svg|bmp|avif)$/.test(name))cmd='image';
    else if(/\.pdf$/.test(name))cmd='pdf';
    else if(/\.(html|htm)$/.test(name))cmd='html';
    if(cmd){printPrompt(cmd+' '+fsPath);const res=runBuiltin(cmd,[fsPath],{});if(res.output)print(res.output);if(res.err)print(res.err,'t-error');}
    else{print('Use: cat '+fsPath+' or embed '+fsPath,'t-dim');}
  }
  fileInput.value='';
});

print(`renders.0 — terminal + widget system
Type 'help' for commands. Type 'about' for what's new.
New: draw  webgl  peer  webview (with nav)  smart embed (proxy fallback)`,'t-dim');
inputField.focus();focusTerminal();
widgetArea.style.pointerEvents='none';

})();
